name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          docker build --no-cache -t ${{ secrets.DOCKERHUB_USERNAME }}/test-backend:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/test-backend:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker stop test-backend || true
            sudo docker rm test-backend || true
            sudo docker system prune -a -f
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/test-backend:latest
            echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' | sudo tee /home/ec2-user/youtube_token.json > /dev/null
            sudo chmod 600 /home/ec2-user/youtube_token.json
            [ -f /home/ec2-user/episode_history.json ] || echo '[]' | sudo tee /home/ec2-user/episode_history.json > /dev/null
            sudo docker run -d -p 8000:8000 \
              -e YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }} \
              -e ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }} \
              -e PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }} \
              -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
              -e ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }} \
              -e RUNWAY_API_KEY=${{ secrets.RUNWAY_API_KEY }} \
              -e YOUTUBE_TOKEN_PATH=/app/youtube_token.json \
              -v /home/ec2-user/youtube_token.json:/app/youtube_token.json:ro \
              -v /home/ec2-user/episode_history.json:/app/episode_history.json \
              --name test-backend ${{ secrets.DOCKERHUB_USERNAME }}/test-backend:latest
